name: Scan job alerts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scanner
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
        run: python3 scan_email.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "job-alert-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jobs.json seen.json
          git diff --cached --quiet || git commit -m "Actualiza ofertas detectadas"
          git push
